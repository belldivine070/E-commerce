{% extends "layout.html" %} 
{% load static %}


{% block content %}
<div class="container mt-4">

    {% for s in logs %}
        <div class="card mb-3">
            <div class="card-body">
                <h5 class="card-title">{{ s.user }} - {{ s.event }}</h5>
                <h6 class="card-subtitle mb-2 text-muted">{{ s.timestamp }}</h6>
                <p class="card-text">{{ s.description }}</p>
            </div>
        </div>
    {% endfor %}
    
</div>
{% endblock %}
