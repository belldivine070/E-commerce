{% extends "layout.html" %} 

{% load static %}


{% block content %}
<div class="container mt-4">
    {% for log in logs %}
        <div class="card mb-3">
            <div class="card-body">
                <h5 class="card-title">{{ log.user }} - {{ log.event }}</h5>
                <h6 class="card-subtitle mb-2 text-muted">{{ log.timestamp }}</h6>
                <p class="card-text">{{ log.description }}</p>
            </div>
        </div>
    {% endfor %}

</div>
{% endblock %}
